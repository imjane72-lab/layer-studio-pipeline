services:
  postgres:
    image: postgres:15-alpine
    container_name: layer-studio-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: layer
      POSTGRES_PASSWORD: layer_dev
      POSTGRES_DB: layer_studio
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U layer -d layer_studio']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: layer-studio-postgres-data
